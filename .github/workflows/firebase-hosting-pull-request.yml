name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DECYCLES_WEB_APP_1777399378 }}
          projectId: decycles-web-app-1777399378
          # Fixed channel → stable URL, so we only authorize ONE domain in
          # Firebase Auth (instead of a new per-PR domain every time). The
          # expiry resets on each deploy, keeping the URL alive during dev.
          channelId: preview
          expires: 30d
