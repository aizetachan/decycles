# Deploys a Firebase Hosting preview channel on each PR and comments its URL.
# Uses the Firebase CLI directly (the FirebaseExtended action does a duplicate
# release that fails as "is the current active version" with newer firebase-tools).
name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  contents: read
  pull-requests: write
  issues: write
jobs:
  preview:
    # Skip forks — they don't have access to the service-account secret.
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci && npm run build
      - name: Deploy preview channel
        id: deploy
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DECYCLES_WEB_APP_1777399378 }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
        run: |
          printf '%s' "$SA_JSON" > "$GOOGLE_APPLICATION_CREDENTIALS"
          npm i -g firebase-tools
          OUT=$(firebase hosting:channel:deploy preview --expires 30d --project decycles-web-app-1777399378 --json)
          echo "$OUT"
          URL=$(echo "$OUT" | jq -r '.result | to_entries[0].value.url')
          echo "url=$URL" >> "$GITHUB_OUTPUT"
      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const marker = '<!-- firebase-preview -->';
            const body = `${marker}\n### 🔍 Preview desplegado\n\n**▶️ ${url}**\n\n⚠️ El feed es **admin-only** (los no-admin ven la pestaña FEED con badge *SOON*). El canal expira en 30 días y se renueva en cada push.`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }
